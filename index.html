<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #222;
        }
        .bio {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .links a {
            display: inline-block;
            margin: 8px;
            padding: 10px 20px;
            background: #2d85ff;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }
        .links a:hover {
            background: #1a6ed8;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 替换成你的头像图片链接 -->
        <img src="https://picsum.photos/200/200" alt="头像" class="avatar">
        <h1>你的名字</h1>
        <p class="bio">这是我的个人网站，记录生活、技术和思考。</p>
        
        <div class="links">
            <a href="https://github.com/" target="_blank">GitHub</a>
            <a href="mailto:your@email.com">邮箱</a>
        </div>
    </div>
</body>
</html>
